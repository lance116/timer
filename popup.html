<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Life Timer Settings</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <form class="settings" id="settings-form">
      <h1>Life Timer</h1>
      <label>
        <span>Born</span>
        <input id="birth-date" name="birthDate" type="date" autocomplete="bday">
      </label>
      <label>
        <span>Live to</span>
        <input
          id="lifespan-years"
          name="lifespanYears"
          type="number"
          min="1"
          max="150"
          step="0.1"
          inputmode="decimal"
          value="85"
        >
      </label>
      <button type="submit">Save</button>
      <p class="status" id="settings-status" role="status"></p>
    </form>
    <script src="popup.js"></script>
  </body>
</html>
