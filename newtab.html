<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <form class="settings-panel" id="settings-form">
        <label>
          <span>Born</span>
          <input id="birth-date" name="birthDate" type="date" autocomplete="bday">
        </label>
        <label>
          <span>Live to</span>
          <input
            id="lifespan-years"
            name="lifespanYears"
            type="number"
            min="1"
            max="150"
            step="0.1"
            inputmode="decimal"
            value="85"
          >
        </label>
        <button type="submit">Save</button>
        <p class="settings-status" id="settings-status" role="status"></p>
      </form>
      <section class="timer-panel" aria-labelledby="timer-title">
        <p class="eyebrow">Time remaining</p>
        <h1 id="timer-title">Remember, you have limited time here.</h1>
        <div class="countdown" id="countdown" aria-live="polite">--.------- years</div>
        <p class="target-date" id="target-date"></p>
      </section>
    </main>
    <script src="newtab.js"></script>
  </body>
</html>
