<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Life Timer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="timer-panel" aria-label="Life countdown">
        <p class="eyebrow">Time remaining</p>
        <dl class="metrics" aria-label="Concrete time remaining">
          <div class="metric">
            <dt>Years</dt>
            <dd id="countdown" aria-live="polite">--.------------</dd>
          </div>
          <div class="metric">
            <dt>Days</dt>
            <dd id="metric-days">--</dd>
          </div>
          <div class="metric">
            <dt>Meals</dt>
            <dd id="metric-meals">--</dd>
          </div>
          <div class="metric">
            <dt>Haircuts</dt>
            <dd id="metric-haircuts">--</dd>
          </div>
          <div class="metric">
            <dt>World Cups</dt>
            <dd id="metric-world-cups">--</dd>
          </div>
          <div class="metric">
            <dt>Summers</dt>
            <dd id="metric-summers">--</dd>
          </div>
        </dl>
      </section>
    </main>
    <script src="newtab.js"></script>
  </body>
</html>
